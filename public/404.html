<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NeuroClin</title>
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/neuroclin-v2/' +
      '?/' + l.pathname.slice('/neuroclin-v2/'.length).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
